<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spindig — Discover Vinyl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .logo {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1.5px;
      margin-bottom: 8px;
    }
    .tagline {
      color: #6a6a6a;
      font-size: 16px;
      letter-spacing: 0.2px;
      margin-bottom: 48px;
    }
    .message {
      font-size: 20px;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .hint {
      color: #4a4a4a;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      background: #1a1a1a;
      color: #f5f5f5;
      border: 1px solid #1f1f1f;
      padding: 16px 36px;
      border-radius: 32px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.2px;
      transition: background 0.2s;
    }
    .btn:hover { background: #252525; }
    .footer {
      margin-top: 48px;
      color: #3a3a3a;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">spindig</div>
    <div class="tagline">discover vinyl, one record at a time</div>
    <p class="message">Someone shared a record with you.</p>
    <p class="hint">Download Spindig to discover curated vinyl picks, preview tracks, and find where to buy.</p>
    <a class="btn" href="https://apps.apple.com/app/spindig/id6759798846">Download on the App Store</a>
    <div class="footer">Available on iOS</div>
  </div>
</body>
</html>
